<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM — Stakeholder Value-Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     COLOR — light theme. Every color is a variable so a single
     edit here swaps the whole scheme.
     ============================================================ */
  :root {
    --bg:          #FFFFFF;
    --node-fill:   #FFFFFF;
    --node-stroke: #1E1E1E;
    --ghost:       #E4E4E4;   /* toggled-off edges */
    --text:        #1E1E1E;
    --text-dim:    #6A6A6A;
    --opportunity: #1E1E1E;   /* black — opportunity arrows sit above the data layer */

    /* five value types, muted */
    --emotional:   #B87F9E;
    --financial:   #7FA37A;
    --functional:  #C77A4F;
    --identity:    #B8A661;
    --meaningful:  #6E8FA8;

    --shadow: drop-shadow(0 2px 4px rgba(0,0,0,0.18));

    --font-head: 'Libre Baskerville', Georgia, serif;
    --font-body: 'Plus Jakarta Sans', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100%;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: auto auto 1fr;
    height: 100vh;
    width: 100vw;
  }

  header {
    padding: 28px 36px 10px;
  }

  header h1 {
    font-family: var(--font-head);
    font-weight: 400;
    font-style: normal;
    font-size: 22px;
    letter-spacing: 0.01em;
    margin: 0;
    color: var(--text);
  }

  /* ============================================================
     CONTROLS — value-layer pills (row 1) and opportunities toggle
     (row 2), stacked with spacing only. No rules or dividers.
     ============================================================ */
  #controls {
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 4px 36px 16px;
    flex-wrap: wrap;
  }

  #controls-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .group-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid transparent;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    filter: var(--shadow);
  }

  /* ============================================================
     CANVAS
     ============================================================ */
  #canvas-wrap {
    position: relative;
    overflow: hidden;
  }

  svg#diagram {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* node cards */
  .node-card {
    fill: var(--node-fill);
    stroke: var(--node-stroke);
    stroke-width: 1.5px;
    cursor: grab;
    transition: stroke 0.2s ease, stroke-width 0.2s ease;
    filter: var(--shadow);
  }

  .node-card.highlight {
    stroke-width: 2.5px;
  }

  .node-card:active { cursor: grabbing; }

  .node-title {
    font-family: var(--font-head);
    font-size: 15px;
    fill: var(--text);
    pointer-events: none;
  }

  .node-title.core {
    font-size: 16.5px;
    font-weight: 600;
  }

  .node-group-label {
    font-family: var(--font-body);
    font-size: 8.5px;
    font-weight: 600;
    fill: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    pointer-events: none;
  }

  .edge-line {
    filter: var(--shadow);
  }

  .edge-hit {
    fill: none;
    stroke: transparent;
    cursor: pointer;
  }

  /* invisible carrier path — exists only so marker-end has something to
     attach to, with the correct stroke-width for markerUnits="strokeWidth"
     to scale against. The visible arrowhead is the SVG <marker> itself. */
  .edge-marker {
    fill: none;
    stroke: transparent;
  }

  .edge-group.dim .edge-line,
  .edge-group.dim .edge-marker {
    opacity: 0.1;
  }

  .edge-group.highlight .edge-line,
  .edge-group.highlight .edge-marker {
    opacity: 1 !important;
  }

  .edge-group.ghost .edge-line,
  .edge-group.ghost .edge-marker {
    opacity: 0.14;
  }

  .edge-group.ghost .particle {
    animation-play-state: paused;
    opacity: 0;
  }

  .edge-group.dim .particle {
    opacity: 0;
  }

  .particle {
    animation-name: travel;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    stroke: none;
  }

  @keyframes travel {
    from { offset-distance: 0%; }
    to   { offset-distance: 100%; }
  }

  /* opportunity text callout — the one observation that isn't a flow */
  .callout-leader {
    stroke: var(--opportunity);
    stroke-width: 1px;
    fill: none;
  }

  .callout-text {
    font-family: var(--font-body);
    font-size: 11.5px;
    fill: var(--text);
  }

  /* ============================================================
     TOOLTIP
     ============================================================ */
  #tooltip {
    position: fixed;
    pointer-events: none;
    max-width: 320px;
    background: var(--node-fill);
    border: 1px solid var(--node-stroke);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.45;
    color: var(--text);
    opacity: 0;
    transform: translate(-50%, calc(-100% - 12px));
    transition: opacity 0.12s ease;
    z-index: 50;
    filter: var(--shadow);
  }

  #tooltip.visible { opacity: 1; }

  /* edge tooltip: route / verb / type / note / basis */
  #tooltip .t-route {
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  #tooltip .t-verb {
    font-family: var(--font-head);
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
  }

  #tooltip .t-type {
    display: flex;
    align-items: center;
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  #tooltip .t-note {
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text);
    opacity: 0.8;
    line-height: 1.5;
    margin-bottom: 6px;
  }

  #tooltip .t-basis {
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  #tooltip .t-swatch {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
  }

  /* node tooltip: title / sentence / bullets */
  #tooltip .t-node-title {
    font-family: var(--font-head);
    font-size: 16px;
    color: var(--text);
    margin-bottom: 4px;
  }

  #tooltip .t-node-sentence {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text);
    opacity: 0.85;
    line-height: 1.45;
    margin-bottom: 6px;
  }

  #tooltip .t-node-bullets {
    margin: 0;
    padding: 0;
    list-style: none;
  }

  #tooltip .t-node-bullets li {
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  /* ============================================================
     LINE-TYPE KEY — quiet corner widget on the canvas itself.
     Color is already communicated by the value-layer pill fills,
     so this only explains line treatment (solid/dashed/weight).
     ============================================================ */
  #line-key {
    position: absolute;
    left: 28px;
    bottom: 22px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    pointer-events: none;
  }

  .key-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 10.5px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .key-line {
    width: 18px;
    height: 0;
    border-top: 1.4px solid var(--text-dim);
    flex: none;
  }

  .key-line.dashed {
    border-top-style: dashed;
  }

  .key-weights {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: none;
  }

  .key-weights i {
    display: block;
    width: 14px;
    height: 0;
    border-top: solid var(--text-dim);
    font-style: normal;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Stakeholder Value-Flow — BPM</h1>
  </header>

  <div id="controls">
    <div id="controls-rows">
      <div id="value-toggles" class="controls-row">
        <span class="group-label">Value layers</span>
        <!-- pills injected by JS -->
      </div>
      <div id="opportunity-row" class="controls-row">
        <button class="pill" id="opp-toggle">Opportunities</button>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <svg id="diagram" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet"></svg>

    <div id="line-key">
      <span class="key-item"><span class="key-line"></span>Finding</span>
      <span class="key-item"><span class="key-line dashed"></span>Hypothesis</span>
      <span class="key-item"><span class="key-weights"><i style="border-top-width:1px"></i><i style="border-top-width:3px"></i><i style="border-top-width:6px"></i></span>Weight = volume</span>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
/* ================================================================
   DATA — edit these arrays; render code below never needs to change.
   ================================================================ */

// NODES: id, label, group, fixed x/y (canvas is 1600x1000). Card size is
// computed from measured text, not hardcoded — see node-card build below.
// hover content = title (label) + framing sentence + bullets
const NODES = [
  { id: 'competitors', label: 'Competitor apps',                    group: 'market',  x: 702,  y: 90,
    sentence: 'The incumbent design language of fitness.',
    bullets: ['Strava, Whoop, Apple Fitness, Garmin', 'TrainingPeaks, Finch, Nike Run Club, Peloton', 'Rings, streaks, scores, PRs, leaderboards'] },
  { id: 'funders',     label: 'Funders',                            group: 'funding', x: 1423, y: 179,
    sentence: 'Capital in exchange for engagement. Not part of this research.',
    bullets: ['Venture funds, angels, accelerators', 'Optimize for DAU, retention, session length', 'Structurally cannot reward "use this less"'] },
  { id: 'media',       label: 'Fitness media & influencers',        group: 'society', x: 180,  y: 207,
    sentence: 'Sets the comparison bar. Contextual — not raised in interviews.',
    bullets: ['Fitness influencers, wellness press', 'Brand marketing, #fitspo', 'Transformation content'] },
  { id: 'society',     label: 'Wellness / optimization culture',    group: 'society', x: 493,  y: 261,
    sentence: 'Promises meaning, delivers obligation. Contextual — not named by participants.',
    bullets: ['The quantified self', 'Hustle and self-improvement norms', '"Self-care" as another thing to fail at'] },
  { id: 'policy',      label: 'Health data policy',                 group: 'legal',   x: 1222, y: 337,
    sentence: 'Constrains, but does not drive.',
    bullets: ['GDPR, HIPAA-adjacent rules', 'State health data laws', 'App Store health data policy'] },
  { id: 'platforms',   label: 'Devices & platforms',                group: 'supply',  x: 1062, y: 453,
    sentence: 'Both supplier and competitor — Apple sits on both sides.',
    bullets: ['Apple Watch, Apple Health, HealthKit', 'Garmin, Oura, Whoop hardware', 'Phone sensors, App Store distribution'] },
  { id: 'user',        label: 'The User',                          group: 'core',    x: 671,  y: 554,
    sentence: 'Six interviewees, 20s–30s, urban — lifelong athletes through reluctant movers.',
    bullets: ['Sam — personal trainer', 'Juanita — planner, busy social life', 'Drew — structured training, lifts', 'Chloe — reluctant mover, incidental exercise', 'Kelsey — walks to work, occasional gym', 'Luis — squash coach, triathlete'] },
  { id: 'social',      label: 'Social circle',                      group: 'society', x: 196,  y: 604,
    sentence: 'Encouragement, and the risk of comparison.',
    bullets: ['Friends, partners, family', 'Workout buddies, running groups', 'Colleagues'] },
  { id: 'bpm',         label: 'BPM',                                group: 'core',    x: 1203, y: 861,
    sentence: 'Working title. Movement as something you tend to, not track.',
    bullets: ['Rings accumulate, never subtract', 'No streak to break, no failure state', 'A quiet day is a fainter ring, not a gap'] },
  { id: 'structures',  label: 'External structures',                group: 'market',  x: 592,  y: 857,
    sentence: 'Commitment devices that lower the bar to start.',
    bullets: ['Booked classes, gyms, studios', 'Race organizers, run clubs', 'Personal trainers, cancellation policies'] },
];

// EDGES: source, target, type, weight (1-3), status ('finding' | 'hypothesis'), verb, optional note
//
// `basis` records evidentiary grounding — 'interview' | 'context' | 'market' — omitted on
// hypothesis edges (nothing to attribute yet). Named `basis` rather than `source` because
// `source` already means "the edge's origin node" in this schema; the two must not collide.
const EDGES = [
  // --- financial ---
  { source: 'funders',     target: 'competitors', type: 'financial',  weight: 3, status: 'finding', verb: 'Capitalizes', basis: 'market',
    note: 'Venture capital in exchange for engagement and retention.' },
  { source: 'competitors', target: 'funders',     type: 'financial',  weight: 3, status: 'finding', verb: 'Returns', basis: 'market',
    note: 'DAU, retention curves, exit value. The loop is self-sustaining.' },
  { source: 'user',        target: 'competitors', type: 'financial',  weight: 2, status: 'finding', verb: 'Subscribes', basis: 'market' },
  { source: 'user',        target: 'structures',  type: 'financial',  weight: 2, status: 'finding', verb: 'Pays', basis: 'interview',
    note: 'Class fees and race entries. Sam charges clients for cancellations.', names: ['Sam'] },
  { source: 'user',        target: 'platforms',   type: 'financial',  weight: 2, status: 'finding', verb: 'Buys', basis: 'market',
    note: 'Hardware. The watch itself.' },
  { source: 'competitors', target: 'media',       type: 'financial',  weight: 2, status: 'finding', verb: 'Sponsors', basis: 'market',
    note: 'Influencer marketing as a paid acquisition channel.' },
  { source: 'funders',     target: 'bpm',         type: 'financial',  weight: 2, status: 'hypothesis', verb: 'Would capitalize' },
  { source: 'bpm',         target: 'funders',     type: 'financial',  weight: 1, status: 'hypothesis', verb: 'Cannot yet return',
    note: 'No revenue model. The absence of a funder loop may be what makes a non-guilt product possible — but that is an argument, not a plan.' },

  // --- functional ---
  { source: 'platforms',   target: 'bpm',         type: 'functional', weight: 3, status: 'finding', verb: 'Supplies', basis: 'market',
    note: 'HR, GPS, steps, distance via HealthKit.' },
  { source: 'platforms',   target: 'competitors', type: 'functional', weight: 3, status: 'finding', verb: 'Supplies', basis: 'market' },
  { source: 'user',        target: 'platforms',   type: 'functional', weight: 3, status: 'finding', verb: 'Generates', basis: 'context',
    note: 'The body is the data source. Rarely acknowledged as a contribution.' },
  { source: 'competitors', target: 'user',        type: 'functional', weight: 3, status: 'finding', verb: 'Scores', basis: 'market',
    note: 'Training load, pace, streaks, readiness.' },
  { source: 'structures',  target: 'user',        type: 'functional', weight: 3, status: 'finding', verb: 'Schedules', basis: 'interview',
    note: 'A booked slot removes the decision. Juanita plans her workouts across the week. Sam: a quarter of clients resist on arrival, but are fine once started. Kelsey and Sam both point to the bar to START being the barrier.',
    names: ['Juanita', 'Sam', 'Kelsey'] },
  { source: 'structures',  target: 'social',      type: 'functional', weight: 2, status: 'finding', verb: 'Convenes', basis: 'context',
    note: 'The class or run club is plausibly where the bond gets formed. Inferred — Kelsey names the partners, not the venue.' },
  { source: 'policy',      target: 'bpm',         type: 'functional', weight: 1, status: 'finding', verb: 'Constrains', basis: 'market' },
  { source: 'policy',      target: 'competitors', type: 'functional', weight: 1, status: 'finding', verb: 'Constrains', basis: 'market' },
  { source: 'bpm',         target: 'user',        type: 'functional', weight: 2, status: 'hypothesis', verb: 'Registers',
    note: 'A ring settles in, sized to the movement. Deliberately low-information.' },
  { source: 'bpm',         target: 'structures',  type: 'functional', weight: 1, status: 'hypothesis', verb: 'Could read' },
  { source: 'structures',  target: 'bpm',         type: 'functional', weight: 1, status: 'hypothesis', verb: 'Could feed' },

  // --- emotional ---
  { source: 'competitors', target: 'user',        type: 'emotional',  weight: 3, status: 'finding', verb: 'Judges', basis: 'interview',
    note: "Rings, streaks, and scores read as a verdict. Kelsey removed her watch — ring pressure was discouraging. Chloe takes hers off to avoid guilt. Drew carries internal shame for missed workouts. Sam's clients confess to him about skipped sessions, unprompted. Four of six participants, independently.",
    names: ['Kelsey', 'Chloe', 'Drew', 'Sam'] },
  { source: 'structures',  target: 'user',        type: 'emotional',  weight: 2, status: 'finding', verb: 'Commits — or judges', basis: 'interview',
    note: 'Dual-natured. Supportive when framed as commitment — Drew signs up for races in advance; Sam charges for cancellations. Tips into judgment when framed comparatively.',
    names: ['Drew', 'Sam'] },
  { source: 'social',      target: 'user',        type: 'emotional',  weight: 2, status: 'finding', verb: 'Encourages', basis: 'interview',
    note: "Kelsey's workout partners encourage her to stay active.", names: ['Kelsey'] },
  { source: 'user',        target: 'social',      type: 'emotional',  weight: 2, status: 'finding', verb: 'Confesses', basis: 'interview',
    note: "Guilt flows outward. Sam's clients volunteer it without being asked.", names: ['Sam'] },
  { source: 'society',     target: 'user',        type: 'emotional',  weight: 3, status: 'finding', verb: 'Pressures', basis: 'context',
    note: "Optimization culture as ambient obligation. NOTE: participants described guilt arriving through apps and watches — none named 'culture' as such. This edge is inferred, not reported." },
  { source: 'media',       target: 'user',        type: 'emotional',  weight: 2, status: 'finding', verb: 'Sets the bar', basis: 'context',
    note: 'Transformation content and fitness influencers as a comparison baseline. NOTE: no participant raised influencers or media. Inferred.' },
  { source: 'bpm',         target: 'user',        type: 'emotional',  weight: 3, status: 'hypothesis', verb: 'Reassures',
    note: "'Today can be small.' 'Movement is movement.' Untested — no evidence this lands as warmth rather than as another prompt." },

  // --- identity ---
  { source: 'user',        target: 'structures',  type: 'identity',   weight: 3, status: 'finding', verb: 'Invests', basis: 'interview',
    note: 'Identity flows FROM the person INTO the structure. Luis has movement built into his work — it is integral to his life. Drew signs up for races in advance to create the commitment. Competitor apps invert this: the ring issues a verdict TO the user.',
    names: ['Luis', 'Drew'] },
  { source: 'competitors', target: 'user',        type: 'identity',   weight: 2, status: 'finding', verb: 'Verdicts', basis: 'interview',
    note: 'The ring tells you who you were today. Kelsey found the pressure to close them discouraging enough to stop wearing the watch.',
    names: ['Kelsey'] },
  { source: 'social',      target: 'structures',  type: 'identity',   weight: 2, status: 'finding', verb: 'Commits', basis: 'interview',
    note: "Kelsey's workout partners encourage her to stay active. Whether they are specifically why a class gets attended is an extension of what she said.",
    names: ['Kelsey'] },
  { source: 'society',     target: 'user',        type: 'identity',   weight: 2, status: 'finding', verb: 'Defines', basis: 'context' },
  { source: 'society',     target: 'competitors', type: 'identity',   weight: 3, status: 'finding', verb: 'Dictates', basis: 'market',
    note: 'Optimization culture as the reason rings, streaks and scores are the design language. Structural claim about the market, not from this research.' },
  { source: 'competitors', target: 'society',     type: 'identity',   weight: 3, status: 'finding', verb: 'Reinforces', basis: 'market',
    note: 'And the products entrench the culture back. Co-produced.' },
  { source: 'media',       target: 'competitors', type: 'identity',   weight: 2, status: 'finding', verb: 'Aspires', basis: 'market' },
  { source: 'user',        target: 'society',     type: 'identity',   weight: 1, status: 'finding', verb: 'Rarely answers', basis: 'context',
    note: 'Guilt is received; almost nothing is returned. Inferred from the shape of the map, not reported by participants.' },
  { source: 'bpm',         target: 'user',        type: 'identity',   weight: 2, status: 'hypothesis', verb: 'Accumulates',
    note: 'Building toward consistency, not a daily verdict.' },

  // --- meaningful --- (deliberately NO user -> bpm edge here — the absence is the point)
  { source: 'bpm',         target: 'user',        type: 'meaningful', weight: 2, status: 'hypothesis', verb: 'Tends',
    note: 'THE BET. Movement as care rather than debt. Untested. NOTE: the interviews contain almost no meaningful-register talk about movement at all — the dominant registers are obligation, guilt, and logistics. Luis comes closest, and reads as identity more than meaning.' },
  { source: 'social',      target: 'user',        type: 'meaningful', weight: 1, status: 'hypothesis', verb: 'Could belong',
    note: 'Belonging is a genuine meaningful value. The open question: can private accountability exist without becoming social fitness?' },
  { source: 'society',     target: 'user',        type: 'meaningful', weight: 1, status: 'finding', verb: 'Promises', basis: 'context',
    note: "Wellness culture claims meaning — 'self-care,' 'living your best life.' What participants described receiving was guilt. NOTE: none of them named culture directly; this is contextual inference, not a finding." },
  // structures -> user meaningful REMOVED: a booked class delivers function and emotion, not
  // meaning — it was padding. There remains NO user -> bpm meaningful edge; the absence is the point.
];

// Value types in fixed toggle order
const VALUE_TYPES = [
  { id: 'emotional',  label: 'Emotional'  },
  { id: 'financial',  label: 'Financial'  },
  { id: 'functional', label: 'Functional' },
  { id: 'identity',   label: 'Identity'   },
  { id: 'meaningful', label: 'Meaningful' },
];

// Text color chosen per swatch for contrast when a pill is ON (filled).
const PILL_ON_TEXT = {
  emotional: '#000000',
  financial: '#000000',
  functional: '#000000',
  identity: '#000000',
  meaningful: '#000000',
};

// OPPORTUNITY ARROWS — proposed flows, not findings. Rendered exactly like a
// data edge (tapered ribbon, particles) but forced black + dashed, and only
// mounted in the DOM while the overlay toggle is on. `weight: 2` gives them a
// weight-2-equivalent (6px) stroke per spec.
const OPPORTUNITY_EDGES = [
  { source: 'bpm',    target: 'funders', type: 'financial',  verb: 'Proposes',
    note: "A tending model has no equivalent return path. The engagement machine is financially self-sustaining; this one isn't yet." },
  { source: 'bpm',    target: 'user',    type: 'meaningful', verb: 'Proposes',
    note: 'The thesis bet: movement as something you tend to. Untested.' },
  { source: 'social', target: 'user',    type: 'meaningful', verb: 'Proposes',
    note: 'Unclaimed — private accountability without becoming social fitness.' },
  { source: 'user',   target: 'society', type: 'identity',   verb: 'Proposes',

const OPPORTUNITY_CALLOUT = {

const svg = d3.select('#diagram');

/* ================================================================
   EDGE SYSTEM
   ================================================================
   STEP 1  data prep: fixed lane index per edge, permanent, same at both ends
   STEP 2  per-node attachment ordering: live function of current positions
   STEP 3  path construction: centerline + lane offset + gentle bow + taper
   STEP 4  arrowheads: native SVG <marker>
   STEP 5  particles
   STEP 6  line style (solid/dashed/opportunity)
   STEP 7  live recomputation on drag, scoped to the dragged node
   ================================================================ */

const STROKE_WIDTH = { 1: 2, 2: 6, 3: 12 };        // max (source-end) width of the taper
const PARTICLE_DURATION = { 1: 11, 2: 8, 3: 5.5 };
const ARROW_LANDING_GAP = 5;                        // stop ~5px short of the true card boundary
const START_GAP = 3;                                // small clearance at the source end too
const TAPER_FRACTION = 0.14;                        // last 14% of path length tapers
const TAPER_MIN_WIDTH = 2;                          // non-zero floor — the marker supplies the tip
const RIBBON_SEGMENTS = 28;

const BOW = 14;                                     // gentle constant arc height
const LANE_UNIT = 9;                                // px per lane step, per edge of a same-pair bundle
const CARD_CORNER_R = 8;                            // must match the rx used on the drawn card <rect>

/* ---------------- STEP 1: lane assignment (fixed, permanent) ---------------- */
// Sort every edge within its unordered-pair bundle by value type in a fixed
// order, then by direction as a tiebreaker, and assign a fixed integer lane
// centered on 0. This never changes after assignment, regardless of node
// position or which end of the edge is being rendered.
const LANE_TYPE_ORDER = ['financial', 'functional', 'emotional', 'identity', 'meaningful'];

const pairGroups = new Map();
ALL_EDGES.forEach(e => {
  const key = [e.source, e.target].slice().sort().join('|');
  if (!pairGroups.has(key)) pairGroups.set(key, []);
  pairGroups.get(key).push(e);
});
pairGroups.forEach((group, key) => {
  const [a] = key.split('|');
  group.sort((x, y) => {
    const typeDiff = LANE_TYPE_ORDER.indexOf(x.type) - LANE_TYPE_ORDER.indexOf(y.type);
    if (typeDiff !== 0) return typeDiff;
    const xForward = x.source === a ? 0 : 1; // A->B before B->A
    const yForward = y.source === a ? 0 : 1;
    return xForward - yForward;
  });
  const centerIdx = Math.floor((group.length - 1) / 2);
  group.forEach((e, i) => { e._lane = i - centerIdx; });
});

/* ---------------- rounded-rect card boundary geometry ---------------- */
// Pure geometry primitives: given a card's current width/height/center, map
// an angle to a point on its TRUE rounded-rect boundary (4 straight runs +
// 4 quarter-circle corner arcs), or vice versa. Independent of any specific
// edge or lane — reused by Step 2 for every node, every recomputation.
function cardSharpPerimeter(node) {
  return 2 * (node._cardW + node._cardH);
}
function cardRoundedPerimeter(node) {
  const r = Math.min(CARD_CORNER_R, node._cardW / 2, node._cardH / 2);

}

// angle -> position along the perimeter loop (stable monotonic sort key,
// rescaled from a simple sharp-rectangle parameterization into the true

function angleToPerimeterPos(node, theta) {
  const hw = node._cardW / 2, hh = node._cardH / 2;
  const dx = Math.cos(theta), dy = Math.sin(theta);
  const tx = dx !== 0 ? hw / Math.abs(dx) : Infinity;
  const ty = dy !== 0 ? hh / Math.abs(dy) : Infinity;
  const W = node._cardW, H = node._cardH;
  let sharpPos;
  if (tx < ty) {
    const y = dy * tx;
    sharpPos = dx > 0 ? (W + (y + hh)) : (2 * W + H + (hh - y));
  } else {
    const x = dx * ty;
    sharpPos = dy < 0 ? (x + hw) : (W + H + (hw - x));
  }
  return sharpPos * (cardRoundedPerimeter(node) / cardSharpPerimeter(node));
}
// perimeter position -> actual (x,y) + outward normal, walking clockwise
// from the top-left corner: top -> right -> bottom -> left
function perimeterPosToPoint(node, s) {
  const W = node._cardW, H = node._cardH;
  const r = Math.min(CARD_CORNER_R, W / 2, H / 2);
  const hw = W / 2, hh = H / 2;
  const straightW = W - 2 * r, straightH = H - 2 * r;
  const arcLen = (Math.PI / 2) * r;
  const HALF_PI = Math.PI / 2;
  const P = 2 * straightW + 2 * straightH + 4 * arcLen;
  let ss = ((s % P) + P) % P;

  if (ss < straightW) return { x: node.x + (-hw + r) + ss, y: node.y - hh, nx: 0, ny: -1 };
  ss -= straightW;
  if (ss < arcLen) {
    const theta = -HALF_PI + (ss / arcLen) * HALF_PI;
    return { x: node.x + (hw - r) + r * Math.cos(theta), y: node.y + (-hh + r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  ss -= arcLen;
  if (ss < straightH) return { x: node.x + hw, y: node.y + (-hh + r) + ss, nx: 1, ny: 0 };
  ss -= straightH;
  if (ss < arcLen) {
    const theta = (ss / arcLen) * HALF_PI;
    return { x: node.x + (hw - r) + r * Math.cos(theta), y: node.y + (hh - r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  ss -= arcLen;
  if (ss < straightW) return { x: node.x + (hw - r) - ss, y: node.y + hh, nx: 0, ny: 1 };
  ss -= straightW;
  if (ss < arcLen) {
    const theta = HALF_PI + (ss / arcLen) * HALF_PI;
    return { x: node.x + (-hw + r) + r * Math.cos(theta), y: node.y + (hh - r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  ss -= arcLen;
  if (ss < straightH) return { x: node.x - hw, y: node.y + (hh - r) - ss, nx: -1, ny: 0 };
  ss -= straightH;
  const theta = Math.PI + (ss / arcLen) * HALF_PI;
  return { x: node.x + (-hw + r) + r * Math.cos(theta), y: node.y + (-hh + r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
}

/* ---------------- STEP 2: per-node attachment ordering (live) ---------------- */
// For an edge touching `atNodeId`, the far node's position nudged
// perpendicular to the pair's canonical A->B direction by this edge's FIXED
// lane. Using the same shift regardless of which end is being computed is
// what keeps a bundle's lanes parallel: two edges sharing a destination get
// distinctly different (but consistently, permanently offset) aim points,
// so they naturally sort into adjacent — not swapped — attachment order at
// BOTH ends.
function edgeVirtualAim(e, atNodeId) {
  const sortedPair = [e.source, e.target].slice().sort();
  const nodeA = nodeById(sortedPair[0]), nodeB = nodeById(sortedPair[1]);
  const theta = Math.atan2(nodeB.y - nodeA.y, nodeB.x - nodeA.x);
  const perpX = -Math.sin(theta), perpY = Math.cos(theta);
  const shift = e._lane * LANE_UNIT;
  const farId = atNodeId === e.source ? e.target : e.source;
  const far = nodeById(farId);
  return { x: far.x + perpX * shift, y: far.y + perpY * shift };
}

// Pure function of CURRENT node positions: recomputes every edge touching
// `nodeId`'s attachment point at THIS node only. Call once per node at
// load, or for just the dragged node during a drag (Step 7).
function resolveNodeAttachments(nodeId) {
  const node = nodeById(nodeId);
  const touching = ALL_EDGES.filter(e => e.source === nodeId || e.target === nodeId);
  if (touching.length === 0) return;

  const entries = touching.map(e => {
    const isSource = e.source === nodeId;
    const aim = edgeVirtualAim(e, nodeId);
    const theta = Math.atan2(aim.y - node.y, aim.x - node.x);
    return { edge: e, isSource, naturalPos: angleToPerimeterPos(node, theta), halfWidth: STROKE_WIDTH[e.weight] / 2 };
  });

  const P = perimeterLength(node);
  let ordered, resolvedPositions;

  if (entries.length === 1) {
    ordered = entries;
    resolvedPositions = [((entries[0].naturalPos % P) + P) % P];
  } else {
    entries.forEach(en => { en.pos = ((en.naturalPos % P) + P) % P; });
    entries.sort((a, b) => a.pos - b.pos);
    const n = entries.length;
    // cut the loop at its largest existing gap, then enforce spacing
    // linearly from there — lets an overcrowded side spill onto a
    // neighboring one instead of clamping back onto itself
    let maxGap = -1, cutIndex = 0;
    for (let i = 0; i < n; i++) {
      const cur = entries[i].pos;
      const next = i === n - 1 ? entries[0].pos + P : entries[i + 1].pos;
      const gap = next - cur;
      if (gap > maxGap) { maxGap = gap; cutIndex = (i + 1) % n; }
    }
    ordered = entries.slice(cutIndex).concat(entries.slice(0, cutIndex));
    const unrolled = [ordered[0].pos];
    for (let i = 1; i < ordered.length; i++) {
      let p = ordered[i].pos;
      while (p < unrolled[i - 1]) p += P;
      unrolled.push(p);
    }
    for (let i = 1; i < unrolled.length; i++) {
      // minimum gap scales with BOTH edges' own thickness
      const minGap = ordered[i - 1].halfWidth + ordered[i].halfWidth + GUTTER;
      if (unrolled[i] - unrolled[i - 1] < minGap) unrolled[i] = unrolled[i - 1] + minGap;
    }
    // GUARD: never let the enforced spacing overflow one full lap — an
    // overflowing span wraps past P and lands OUT OF ORDER relative to
    // earlier entries, which reads as edges crossing near the node despite
    // no two attachment points literally overlapping. Compress
    // proportionally instead; a uniform scale of a monotonic sequence
    // stays monotonic, so the angular order survives.
    const span = unrolled[unrolled.length - 1] - unrolled[0];
    const maxSpan = P * 0.96;
    if (span > maxSpan) {
      const shrink = maxSpan / span;
      const base = unrolled[0];
      for (let i = 0; i < unrolled.length; i++) unrolled[i] = base + (unrolled[i] - base) * shrink;
    }
    resolvedPositions = unrolled.map(p => ((p % P) + P) % P);
  }

  ordered.forEach((en, i) => {
    const p = perimeterPosToPoint(node, resolvedPositions[i]);
    const gap = en.isSource ? START_GAP : ARROW_LANDING_GAP;
    const point = { x: p.x + p.nx * gap, y: p.y + p.ny * gap };
    if (en.isSource) en.edge._attachAtSource = point;
    else en.edge._attachAtTarget = point;
  });
}

/* ---------------- STEP 3: path construction (live) ---------------- */
function computeGeometry(e) {
  const start = e._attachAtSource, end = e._attachAtTarget;

  // own chord normal), so every lane in a bundle bows the same way by the
  // same amount — a uniform shift of already-parallel lanes stays parallel
  const sortedPair = [e.source, e.target].slice().sort();
  const nodeA = nodeById(sortedPair[0]), nodeB = nodeById(sortedPair[1]);
  const pairTheta = Math.atan2(nodeB.y - nodeA.y, nodeB.x - nodeA.x);
  const perpX = -Math.sin(pairTheta), perpY = Math.cos(pairTheta);

  const cdx = end.x - start.x, cdy = end.y - start.y;
  const cdist = Math.hypot(cdx, cdy) || 1;
  const bow = Math.min(BOW, cdist * 0.25);
  const mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
  const cp = { x: mx + perpX * bow, y: my + perpY * bow };

  e._geo = { start, cp, end };
  return e._geo;
}

function pathD(geo) {
  return `M${geo.start.x},${geo.start.y} Q${geo.cp.x},${geo.cp.y} ${geo.end.x},${geo.end.y}`;
}

function edgeMidpoint(e) {
  const g = e._geo || computeGeometry(e);

  const x = (1 - t) * (1 - t) * g.start.x + 2 * (1 - t) * t * g.cp.x + t * t * g.end.x;
  const y = (1 - t) * (1 - t) * g.start.y + 2 * (1 - t) * t * g.cp.y + t * t * g.end.y;
  return { x, y };
}

// tapered ribbon: a single filled shape, full weight-based width near the
// source, narrowing to a small non-zero floor near the target — the marker
// (Step 4) supplies the visible point, so the ribbon never needs to reach
// true zero itself
function bezierPoint(g, t) {
  const mt = 1 - t;
  return {
    x: mt * mt * g.start.x + 2 * mt * t * g.cp.x + t * t * g.end.x,

  // fraction of its chord) so a thick dash reads as an elongated mark

/* ---------------- STEP 4: arrowheads — native SVG <marker> ---------------- */
// orient="auto-start-reverse" reads the carrier path's own tangent at its

const markerDefs = svg.append('defs');
VALUE_TYPES.map(v => v.id).concat(['opportunity']).forEach(type => {

    .attr('id', 'arrow-' + type)
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 9)
    .attr('refY', 5)
    .attr('markerWidth', 4)
    .attr('markerHeight', 4)
    .attr('markerUnits', 'strokeWidth')
    .attr('orient', 'auto-start-reverse')

/* ---------------- STEP 5: particles ---------------- */
// Position travels via CSS offset-path/offset-distance. Radius is driven by

  for (let i = 0; i < n; i++) {

      .attr('class', 'particle')
      .style('fill', color)
      .style('offset-path', `path('${pathD(e._geo)}')`)
      .style('animation-duration', dur + 's')
      .style('animation-delay', (-(i / n) * dur) + 's')

// layers, created up front so z-order is fixed regardless of when we later

const edgeLayer = svg.append('g').attr('id', 'edge-layer');
const oppEdgeLayer = svg.append('g').attr('id', 'opp-edge-layer');
const nodeLayer = svg.append('g').attr('id', 'node-layer');
const calloutLayer = svg.append('g').attr('id', 'callout-layer');

// --- node cards ------------------------------------------------------------
// UNCHANGED: built and measured first (before edge geometry) because
// attachment resolution needs each card's real width/height.
const nodeGroups = nodeLayer.selectAll('g.node-group')
  .data(NODES)
  .join('g')
  .attr('class', 'node-group')
  .attr('id', d => 'node-' + d.id)
  .attr('transform', d => `translate(${d.x},${d.y})`)
  .call(d3.drag().on('drag', dragged));

const CARD_PAD_X = 23, CARD_PAD_Y = 17, CARD_BLOCK_GAP = 4, CARD_MIN_W = 102, CARD_MIN_H = 59;

nodeGroups.each(function (d) {
  const g = d3.select(this);
  const hasGroup = d.group !== 'core';

  const groupText = g.append('text')
    .attr('class', 'node-group-label')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'hanging')
    .text(hasGroup ? d.group : '');

  const titleText = g.append('text')
    .attr('class', 'node-title' + (d.group === 'core' ? ' core' : ''))
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'hanging');

  const words = d.label.split(' ');
  const lines = [];
  let line = '';
  words.forEach(w => {
    const test = (line ? line + ' ' : '') + w;
    if (test.length > 20 && line) { lines.push(line); line = w; }
    else line = test;
  });
  if (line) lines.push(line);
  lines.forEach((l, i) => {
    titleText.append('tspan').attr('x', 0).attr('dy', i === 0 ? 0 : '1.25em').text(l);
  });

  const groupBBox = hasGroup ? groupText.node().getBBox() : { width: 0, height: 0 };
  const titleBBox = titleText.node().getBBox();
  const gapBetween = hasGroup ? CARD_BLOCK_GAP : 0;
  const contentWidth = Math.max(groupBBox.width, titleBBox.width);
  const contentHeight = groupBBox.height + gapBetween + titleBBox.height;

  const cardW = Math.max(CARD_MIN_W, contentWidth + CARD_PAD_X * 2);
  const cardH = Math.max(CARD_MIN_H, contentHeight + CARD_PAD_Y * 2);
  d._cardW = cardW;
  d._cardH = cardH;

  g.insert('rect', ':first-child')
    .attr('class', 'node-card')
    .attr('x', -cardW / 2)
    .attr('y', -cardH / 2)
    .attr('width', cardW)
    .attr('height', cardH)
    .attr('rx', 8);

  let cursorY = -contentHeight / 2;
  if (hasGroup) {
    groupText.attr('y', cursorY);
    cursorY += groupBBox.height + gapBetween;
  }
  titleText.attr('y', cursorY);
});

// resolve Step 2 for every node once, at load, using the fixed default layout
NODES.forEach(n => resolveNodeAttachments(n.id));

// shared builder for both data edges and opportunity edges
function buildEdgeVisuals(sel) {
  sel.each(function (d) {
    computeGeometry(d);
    const g = d3.select(this);
    const color = d.isOpportunity ? 'var(--opportunity)' : `var(--${d.type})`;

    g.append('path')
      .attr('class', 'edge-hit')
      .attr('stroke-width', STROKE_WIDTH[d.weight] + 20)
      .attr('d', pathD(d._geo));

    g.append('path')
      .attr('class', 'edge-line')
      .attr('d', taperedPath(d))
      .attr('fill', color);

    // invisible carrier for the SVG <marker> arrowhead — the marker

      .attr('class', 'edge-marker')
      .attr('d', pathD(d._geo))
      .attr('stroke-width', STROKE_WIDTH[d.weight])
      .attr('marker-end', `url(#arrow-${d.isOpportunity ? 'opportunity' : d.type})`);

    .on('mouseenter', function (event, d) {
      setEdgeHighlight(d._id);

    .on('mouseleave', function () {

}

function refreshEdgeGeometry(e) {

  const d = pathD(e._geo);
  g.select('.edge-hit').attr('d', d);
  g.select('.edge-line').attr('d', taperedPath(e));
  g.select('.edge-marker').attr('d', d);
  g.selectAll('.particle').style('offset-path', `path('${d}')`);
}

function setEdgeHighlight(activeId) {
  edgeGroups.classed('dim', e => activeId !== null && e._id !== activeId);
  edgeGroups.classed('highlight', e => e._id === activeId);
  oppEdgeLayer.selectAll('.edge-group').classed('dim', e => activeId !== null && e._id !== activeId);
  oppEdgeLayer.selectAll('.edge-group').classed('highlight', e => e._id === activeId);
}

// --- data edges ---
const edgeGroups = edgeLayer.selectAll('g.edge-group')
  .data(EDGES)
  .join('g')
  .attr('class', d => `edge-group type-${d.type}`)
  .attr('id', d => d._id);

buildEdgeVisuals(edgeGroups);

function setNodeHighlight(nodeId) {
  if (nodeId === null) { setEdgeHighlight(null); return; }
  const connected = new Set(
    ALL_EDGES.filter(e => e.source === nodeId || e.target === nodeId).map(e => e._id)
  );
  edgeGroups.classed('dim', e => !connected.has(e._id));
  edgeGroups.classed('highlight', e => connected.has(e._id));
  oppEdgeLayer.selectAll('.edge-group').classed('dim', e => !connected.has(e._id));
  oppEdgeLayer.selectAll('.edge-group').classed('highlight', e => connected.has(e._id));
}

nodeGroups
  .on('mouseenter', function (event, d) {
    setNodeHighlight(d.id);
    d3.select(this).select('.node-card').classed('highlight', true);
    showTooltip(event, nodeTooltipHtml(d));
  })
  .on('mousemove', moveTooltip)
  .on('mouseleave', function () {
    setNodeHighlight(null);
    d3.select(this).select('.node-card').classed('highlight', false);
    hideTooltip();
  });

/* ---------------- STEP 7: live recomputation on drag ---------------- */
// Scoped to the dragged node only: re-run Step 2 for just this node (its
// touching edges' attachment points AT this node), then rebuild geometry
// for those same edges. The far end of each touching edge keeps whatever
// attachment point it already had — its own node didn't move, and re-
// resolving it too isn't needed for correctness, only for an already-solved
// ordering that hasn't changed, so skipping it keeps drag responsive even
// on a fully-connected graph.
function dragged(event, d) {
  d.x = event.x;
  d.y = event.y;
  d3.select(this).attr('transform', `translate(${d.x},${d.y})`);
  resolveNodeAttachments(d.id);
  ALL_EDGES.forEach(e => {
    if (e.source === d.id || e.target === d.id) refreshEdgeGeometry(e);
  });
  renderCallout();
}

/* ================================================================
   OPPORTUNITY OVERLAY — proposed-flow arrows + one text callout
   ================================================================ */
function renderOpportunityEdges() {
  const active = document.getElementById('opp-toggle').classList.contains('on');

  for (let i = activeParticles.length - 1; i >= 0; i--) {
    if (activeParticles[i].isOpportunity) activeParticles.splice(i, 1);
  }

  const sel = oppEdgeLayer.selectAll('g.edge-group').data(active ? OPPORTUNITY_EDGES : [], d => d._id);
  sel.exit().remove();
  const enter = sel.enter().append('g')
    .attr('class', d => `edge-group opp-edge type-${d.type}`)
    .attr('id', d => d._id);
  buildEdgeVisuals(enter);
  applyIsolation();
}

function wrapText(str, maxChars) {
  const words = str.split(' ');
  const lines = [];
  let line = '';
  words.forEach(w => {
    const test = (line ? line + ' ' : '') + w;
    if (test.length > maxChars && line) { lines.push(line); line = w; }
    else line = test;
  });
  if (line) lines.push(line);
  return lines;
}

function renderCallout() {
  const active = document.getElementById('opp-toggle').classList.contains('on');
  calloutLayer.selectAll('*').remove();
  if (!active) return;

  const e1 = findEdge('society', 'competitors', 'identity');
  const e2 = findEdge('competitors', 'society', 'identity');
  const m1 = edgeMidpoint(e1), m2 = edgeMidpoint(e2);
  const anchor = { x: (m1.x + m2.x) / 2, y: (m1.y + m2.y) / 2 };
  const textPos = { x: anchor.x + 40, y: anchor.y - 230 };

  calloutLayer.append('line')
    .attr('class', 'callout-leader')
    .attr('x1', anchor.x).attr('y1', anchor.y)
    .attr('x2', textPos.x).attr('y2', textPos.y + 12);

  const lines = wrapText(OPPORTUNITY_CALLOUT.label, 32);
  const textEl = calloutLayer.append('text')
    .attr('class', 'callout-text')
    .attr('x', textPos.x)
    .attr('y', textPos.y);
  lines.forEach((l, i) => {
    textEl.append('tspan').attr('x', textPos.x).attr('dy', i === 0 ? 0 : '1.35em').text(l);
  });
}

// ON: filled with the pill's own color, contrast text, no border.
// OFF: white fill, border + text in the pill's own color — color identity
// stays legible either way; only the fill/text relationship flips.
function paintPill(btn, colorVar, onTextColor, isOn) {
  if (isOn) {
    btn.style.background = `var(--${colorVar})`;
    btn.style.color = onTextColor;
    btn.style.borderColor = 'transparent';
  } else {
    btn.style.background = '#FFFFFF';
    btn.style.color = `var(--${colorVar})`;
    btn.style.borderColor = `var(--${colorVar})`;
  }
}

paintPill(document.getElementById('opp-toggle'), 'opportunity', '#FFFFFF', false);

document.getElementById('opp-toggle').addEventListener('click', function () {
  const isOn = this.classList.toggle('on');
  paintPill(this, 'opportunity', '#FFFFFF', isOn);
  renderOpportunityEdges();
  renderCallout();
});

/* ================================================================
   VALUE-TYPE TOGGLES (isolate, not filter) — filled pills
   ================================================================ */
const activeTypes = new Set(VALUE_TYPES.map(v => v.id));
const toggleWrap = document.getElementById('value-toggles');

VALUE_TYPES.forEach(vt => {
  const btn = document.createElement('button');
  btn.className = 'pill';
  btn.dataset.type = vt.id;
  btn.textContent = vt.label;
  paintPill(btn, vt.id, PILL_ON_TEXT[vt.id], true);
  btn.addEventListener('click', () => {
    let isOn;
    if (activeTypes.has(vt.id)) { activeTypes.delete(vt.id); isOn = false; }
    else { activeTypes.add(vt.id); isOn = true; }
    paintPill(btn, vt.id, PILL_ON_TEXT[vt.id], isOn);
    applyIsolation();
  });
  toggleWrap.appendChild(btn);
});

function applyIsolation() {
  edgeGroups.classed('ghost', d => !activeTypes.has(d.type));
  oppEdgeLayer.selectAll('.edge-group').classed('ghost', d => !activeTypes.has(d.type));
}

/* ================================================================
   TOOLTIP
   ================================================================ */
const tooltip = document.getElementById('tooltip');

function showTooltip(event, html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(event);
}
function moveTooltip(event) {
  tooltip.style.left = event.clientX + 'px';
  tooltip.style.top = event.clientY + 'px';
}
function hideTooltip() {
  tooltip.classList.remove('visible');
}

function edgeTooltipHtml(d) {
  const srcLabel = nodeById(d.source).label;
  const tgtLabel = nodeById(d.target).label;
  const swatchColor = d.isOpportunity ? 'var(--opportunity)' : `var(--${d.type})`;
  let html = `<div class="t-route">${srcLabel} → ${tgtLabel}</div>`;
  html += `<div class="t-verb">${d.verb}</div>`;
  html += `<div class="t-type"><span class="t-swatch" style="background:${swatchColor}"></span>${d.type[0].toUpperCase() + d.type.slice(1)}</div>`;
  if (d.note) html += `<div class="t-note">${d.note}</div>`;
  if (d.isOpportunity) {
    html += `<div class="t-basis">Opportunity — proposed, not evidenced</div>`;
  } else if (d.basis === 'interview') {
    const names = d.names && d.names.length ? d.names.join(', ') : '';
    html += `<div class="t-basis">From interviews${names ? ': ' + names : ''}</div>`;
  } else if (d.basis === 'context') {
    html += `<div class="t-basis">Contextual inference — not named by participants</div>`;
  } else if (d.basis === 'market') {
    html += `<div class="t-basis">Market-structural — not from this research</div>`;
  }
  return html;
}

function nodeTooltipHtml(d) {
  let html = `<div class="t-node-title">${d.label}</div>`;
  html += `<div class="t-node-sentence">${d.sentence}</div>`;
  if (d.bullets && d.bullets.length) {
    html += '<ul class="t-node-bullets">' + d.bullets.map(b => `<li>• ${b}</li>`).join('') + '</ul>';
  }
  return html;
}

/* ================================================================
   INIT
   ================================================================ */
applyIsolation();
renderOpportunityEdges();
renderCallout();
</script>
</body>
</html>
