<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tend: Stakeholder Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     COLOR — light theme. Every color is a variable so a single
     edit here swaps the whole scheme.
     ============================================================ */
  :root {
    /* six-color closed palette — every color anywhere in this file must
       be one of these six values */
    --bg:          #F9EFE6;
    --node-fill:   #F9EFE6;
    --node-stroke: #223A23;
    --text:        #223A23;
    --text-dim:    #597739;
    --lime:        #C5E65A;   /* Opportunities only */
    --data:        #8A8A8A;   /* Data overlay only — explicit neutral gray per the Data-toggle
                                  spec, deliberately outside the five value-type colors and the
                                  six-color base palette so the layer reads as a separate system */

    /* five value types — Emotional and Identity now use the two hex
       values freed up by the background switching from gradient to image */
    --emotional:   #D8DFE1;
    --financial:   #223A23;
    --functional:  #597739;
    --identity:    #F9EFE6;
    --meaningful:  #2822C3;

    --shadow: drop-shadow(0 2px 4px rgba(0,0,0,0.18));   /* edges only — unchanged, not in the six-color set (not requested to change) */
    --shadow-ui: 0 4px 16px rgba(0, 0, 0, 0.15);          /* node cards, pills, tooltip — exact literal spec given, not in the six-color set */

    --font-head: 'Bricolage Grotesque', -apple-system, sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'DM Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image: url('Components/background.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: var(--text);
    font-family: var(--font-body);
    height: 100%;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    width: 100vw;
  }

  header {
    padding: 28px 36px 10px;
  }

  header h1 {
    font-family: var(--font-head);
    font-weight: 400;
    font-style: normal;
    font-size: 42px;
    letter-spacing: 0.01em;
    margin: 0;
    color: var(--text);
    text-align: center;
  }

  /* ============================================================
     CONTROLS — vertical column overlaying the left edge of the canvas,
     starting below the header. Order top to bottom: Opportunities,
     then the "Value layers" label, then the 5 value-type pills.
     ============================================================ */
  #controls {
    position: absolute;
    top: 24px;
    left: 28px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  #value-toggles {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .group-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid transparent;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    box-shadow: var(--shadow-ui);
  }

  /* Shared liquid-glass treatment — node cards and tooltips get the full
     background/border/blur from this class. The Opportunities button gets
     only the blur + highlight (see #opp-toggle below), NOT the
     background/border here, since its fill/border are driven by inline
     styles per ON/OFF toggle state (paintPill) and a class-level background
     would never be visible under them anyway.
     No color value in here is green — any green cast visible on a card
     edge is the blurred background.jpg image itself showing through the
     translucent border/fill via backdrop-filter, not a leftover CSS rule
     (confirmed: --node-fill/--node-stroke are defined but unused nowhere
     in this file, and every value below is neutral/cream).
     Top-highlight is a ::before pseudo-element, NOT an inset box-shadow —
     isolated by testing that an inset box-shadow combined with
     backdrop-filter bleeds a visible light halo OUTSIDE the element's own
     border (confirmed: removing only the inset shadows removed the halo,
     the outer drop shadow alone was always clean). A gradient painted on a
     clipped pseudo-element achieves the same top-bright/bottom-faint look
     without touching box-shadow at all. */
  .glass-surface {
    position: relative;
    overflow: hidden;
    background: linear-gradient(
      180deg,
      rgba(249, 239, 230, 0.35) 0%,
      rgba(249, 239, 230, 0.15) 100%
    );
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }

  .glass-surface::before,
  #opp-toggle::before,
  #data-toggle::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.6) 0%,
      rgba(255, 255, 255, 0) 40%,
      rgba(255, 255, 255, 0) 85%,
      rgba(0, 0, 0, 0.05) 100%
    );
    pointer-events: none;
  }

  #opp-toggle,
  #data-toggle {
    position: relative;
    overflow: hidden;
    gap: 6px;
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }

  .opp-star {
    flex: none;
    height: 9px;
    width: auto;
    color: inherit;
  }

  /* ============================================================
     CANVAS
     ============================================================ */
  #canvas-wrap {
    position: relative;
    overflow: hidden;
  }

  svg#diagram {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* node cards — rendered as an HTML div inside a <foreignObject> rather
     than a plain SVG <rect>, because box-shadow/border don't paint on SVG
     shape geometry in any browser (verified empirically). The
     foreignObject itself carries the exact x/y/width/height the rect used
     to — the card's footprint that attachment-point math depends on is
     unchanged; only the fill technique changed.
     Final spec: transparent fill, dark green outline, neutral drop shadow,
     no blur, no glass, no lime/cream tint. Replaces all prior card
     treatments (glass, lime-tint+blur) in full. */
  .node-card {
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    background: transparent;
    border: 1.5px solid var(--node-stroke);
    border-radius: 10px;
    box-shadow: 0px 4px 16px rgba(0, 0, 0, 0.15);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    cursor: grab;
    transition: box-shadow 0.2s ease;
  }

  /* Resting and hover intentionally look the same, per spec — no added
     border/glow/fill on hover. Shadow deepens slightly as the only cue. */
  .node-card.highlight {
    box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2);
  }

  .node-card:active { cursor: grabbing; }

  .node-title {
    font-family: var(--font-head);
    font-size: 15px;
    fill: #1E1E1E;
    pointer-events: none;
  }

  .node-title.core {
    font-size: 16.5px;
    font-weight: 600;
  }

  .edge-line {
    filter: var(--shadow);
  }

  .edge-hit {
    fill: none;
    stroke: transparent;
    cursor: pointer;
  }

  /* invisible carrier path — exists only so marker-end has something to
     attach to, with the correct stroke-width for markerUnits="strokeWidth"
     to scale against. The visible arrowhead is the SVG <marker> itself. */
  .edge-marker {
    fill: none;
    stroke: transparent;
  }

  /* fragile-trust: permanent baseline dimming for user -> competitors /
     platforms / social edges, signaling unearned/lopsided trust. Declared
     before dim/highlight/ghost below so those (equal-specificity, later in
     source order) still win when an edge is both fragile-trust and, say,
     dimmed by an unrelated hover. */
  .edge-group.fragile-trust .edge-line,
  .edge-group.fragile-trust .edge-marker,
  .edge-group.fragile-trust .particle {
    opacity: 0.55;
  }

  .edge-group.dim .edge-line,
  .edge-group.dim .edge-marker {
    opacity: 0.1;
  }

  .edge-group.highlight .edge-line,
  .edge-group.highlight .edge-marker {
    opacity: 1 !important;
  }

  .edge-group.ghost .edge-line,
  .edge-group.ghost .edge-marker {
    opacity: 0.14;
  }

  .edge-group.ghost .particle {
    animation-play-state: paused;
    opacity: 0;
  }

  .edge-group.dim .particle {
    opacity: 0;
  }

  .particle {
    animation-name: travel;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    stroke: none;
  }

  /* data-glyph diamonds only (path, not circle) — same-hue fill on a
     same-hue ribbon reads as a near-invisible bulge at normal zoom
     (verified empirically), so a thin bg-colored outline is added just to
     this glyph to keep it legible as "a small data glyph on the particle"
     without changing the established look of circle particles elsewhere. */
  path.particle {
    stroke: var(--bg);
    stroke-width: 1.25;
    stroke-linejoin: round;
  }

  @keyframes travel {
    from { offset-distance: 0%; }
    to   { offset-distance: 100%; }
  }

  /* ============================================================
     TOOLTIP
     ============================================================ */
  #tooltip {
    position: fixed;
    pointer-events: none;
    max-width: 320px;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.45;
    color: var(--text);
    opacity: 0;
    transform: translate(-50%, calc(-100% - 12px));
    transition: opacity 0.12s ease;
    z-index: 50;
  }

  #tooltip.visible { opacity: 1; }

  /* edge tooltip: route / verb / type / note / basis */
  #tooltip .t-route {
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  #tooltip .t-verb {
    font-family: var(--font-head);
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
  }

  #tooltip .t-type {
    display: flex;
    align-items: center;
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  #tooltip .t-note {
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text);
    opacity: 0.8;
    line-height: 1.5;
    margin-bottom: 6px;
  }

  #tooltip .t-basis {
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  #tooltip .t-trust {
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 4px;
  }

  #tooltip .t-swatch {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
  }

  /* node tooltip: title / sentence / bullets */
  #tooltip .t-node-title {
    font-family: var(--font-head);
    font-size: 16px;
    color: var(--text);
    margin-bottom: 4px;
  }

  #tooltip .t-node-sentence {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text);
    opacity: 0.85;
    line-height: 1.45;
    margin-bottom: 6px;
  }

  #tooltip .t-node-bullets {
    margin: 0;
    padding: 0;
    list-style: none;
  }

  #tooltip .t-node-bullets li {
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  /* ============================================================
     VIEW SWITCHER — Map/List segmented control, fixed top-right.
     Neutral dark-green pill, deliberately outside the five edge
     colors used for the value-type pills.
     ============================================================ */
  .view-switcher {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 60;
    display: flex;
    border: 1.5px solid #223A23;
    border-radius: 999px;
    overflow: hidden;
    box-shadow: var(--shadow-ui);
  }

  .view-switch-half {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    color: #223A23;
    background: transparent;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .view-switch-half svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  .view-switch-half.active {
    background: #223A23;
    color: #FFFFFF;
  }

</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Tend: Stakeholder Map</h1>
  </header>

  <div class="view-switcher">
    <a href="stakeholder-value-flow.html" class="view-switch-half active" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s7-7.58 7-12a7 7 0 1 0-14 0c0 4.42 7 12 7 12z"/><circle cx="12" cy="10" r="2.5"/></svg>
      <span>Map</span>
    </a>
    <a href="stakeholder-reference.html" class="view-switch-half">

      <span>List</span>

const nodeMap = new Map(NODES.map(n => [n.id, n]));
function nodeById(id) { return nodeMap.get(id); }

/* ================================================================
   EDGE SYSTEM
   ================================================================
   STEP 1  data prep: fixed lane index per edge, permanent, same at both ends
   STEP 2  per-node attachment ordering: live function of current positions
   STEP 3  path construction: centerline + lane offset + gentle bow + taper
   STEP 4  arrowheads: native SVG <marker>
   STEP 5  particles
   STEP 6  line style (solid/dashed/opportunity)
   STEP 7  live recomputation on drag, scoped to the dragged node
   ================================================================ */

const STROKE_WIDTH = { 1: 2, 2: 6, 3: 12 };        // max (source-end) width of the taper
const PARTICLE_DURATION = { 1: 11, 2: 8, 3: 5.5 };
const ARROW_LANDING_GAP = 5;                        // stop ~5px short of the true card boundary
const START_GAP = 3;                                // small clearance at the source end too
const TAPER_FRACTION = 0.14;                        // last 14% of path length tapers
const TAPER_MIN_WIDTH = 2;                          // non-zero floor — the marker supplies the tip
const RIBBON_SEGMENTS = 28;
const DASH_SEGMENTS = 6;
const GUTTER = 4;                                   // constant clearance on top of stroke-width-based gaps
const BOW = 14;                                     // gentle constant arc height
const LANE_UNIT = 9;                                // px per lane step, per edge of a same-pair bundle
const CARD_CORNER_R = 10;                           // must match the CSS border-radius on .node-card

/* ---------------- STEP 1: lane assignment (fixed, permanent) ---------------- */
// Sort every edge within its unordered-pair bundle by value type in a fixed
// order, then by direction as a tiebreaker, and assign a fixed integer lane
// centered on 0. This never changes after assignment, regardless of node
// position or which end of the edge is being rendered.
const LANE_TYPE_ORDER = ['financial', 'functional', 'emotional', 'identity', 'meaningful'];

const pairGroups = new Map();
ALL_EDGES.forEach(e => {
  const key = [e.source, e.target].slice().sort().join('|');
  if (!pairGroups.has(key)) pairGroups.set(key, []);
  pairGroups.get(key).push(e);
});
pairGroups.forEach((group, key) => {
  const [a] = key.split('|');
  group.sort((x, y) => {
    const typeDiff = LANE_TYPE_ORDER.indexOf(x.type) - LANE_TYPE_ORDER.indexOf(y.type);
    if (typeDiff !== 0) return typeDiff;
    const xForward = x.source === a ? 0 : 1; // A->B before B->A
    const yForward = y.source === a ? 0 : 1;
    return xForward - yForward;
  });
  const centerIdx = Math.floor((group.length - 1) / 2);
  group.forEach((e, i) => { e._lane = i - centerIdx; });
});

/* ---------------- rounded-rect card boundary geometry ---------------- */
// Pure geometry primitives: given a card's current width/height/center, map
// an angle to a point on its TRUE rounded-rect boundary (4 straight runs +
// 4 quarter-circle corner arcs), or vice versa. Independent of any specific
// edge or lane — reused by Step 2 for every node, every recomputation.
function cardSharpPerimeter(node) {
  return 2 * (node._cardW + node._cardH);
}
function cardRoundedPerimeter(node) {
  const r = Math.min(CARD_CORNER_R, node._cardW / 2, node._cardH / 2);
  return 2 * (node._cardW - 2 * r) + 2 * (node._cardH - 2 * r) + 2 * Math.PI * r;
}
function perimeterLength(node) {
  return cardRoundedPerimeter(node);
}
// angle -> position along the perimeter loop (stable monotonic sort key,
// rescaled from a simple sharp-rectangle parameterization into the true
// rounded perimeter's coordinate domain)
function angleToPerimeterPos(node, theta) {
  const hw = node._cardW / 2, hh = node._cardH / 2;
  const dx = Math.cos(theta), dy = Math.sin(theta);
  const tx = dx !== 0 ? hw / Math.abs(dx) : Infinity;
  const ty = dy !== 0 ? hh / Math.abs(dy) : Infinity;
  const W = node._cardW, H = node._cardH;
  let sharpPos;
  if (tx < ty) {
    const y = dy * tx;
    sharpPos = dx > 0 ? (W + (y + hh)) : (2 * W + H + (hh - y));
  } else {
    const x = dx * ty;
    sharpPos = dy < 0 ? (x + hw) : (W + H + (hw - x));
  }
  return sharpPos * (cardRoundedPerimeter(node) / cardSharpPerimeter(node));
}
// perimeter position -> actual (x,y) + outward normal, walking clockwise
// from the top-left corner: top -> right -> bottom -> left
function perimeterPosToPoint(node, s) {
  const W = node._cardW, H = node._cardH;
  const r = Math.min(CARD_CORNER_R, W / 2, H / 2);
  const hw = W / 2, hh = H / 2;
  const straightW = W - 2 * r, straightH = H - 2 * r;
  const arcLen = (Math.PI / 2) * r;
  const HALF_PI = Math.PI / 2;
  const P = 2 * straightW + 2 * straightH + 4 * arcLen;
  let ss = ((s % P) + P) % P;

  if (ss < straightW) return { x: node.x + (-hw + r) + ss, y: node.y - hh, nx: 0, ny: -1 };
  ss -= straightW;
  if (ss < arcLen) {
    const theta = -HALF_PI + (ss / arcLen) * HALF_PI;
    return { x: node.x + (hw - r) + r * Math.cos(theta), y: node.y + (-hh + r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  ss -= arcLen;
  if (ss < straightH) return { x: node.x + hw, y: node.y + (-hh + r) + ss, nx: 1, ny: 0 };
  ss -= straightH;
  if (ss < arcLen) {
    const theta = (ss / arcLen) * HALF_PI;
    return { x: node.x + (hw - r) + r * Math.cos(theta), y: node.y + (hh - r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  ss -= arcLen;
  if (ss < straightW) return { x: node.x + (hw - r) - ss, y: node.y + hh, nx: 0, ny: 1 };
  ss -= straightW;
  if (ss < arcLen) {
    const theta = HALF_PI + (ss / arcLen) * HALF_PI;
    return { x: node.x + (-hw + r) + r * Math.cos(theta), y: node.y + (hh - r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
  }
  ss -= arcLen;
  if (ss < straightH) return { x: node.x - hw, y: node.y + (hh - r) - ss, nx: -1, ny: 0 };
  ss -= straightH;
  const theta = Math.PI + (ss / arcLen) * HALF_PI;
  return { x: node.x + (-hw + r) + r * Math.cos(theta), y: node.y + (-hh + r) + r * Math.sin(theta), nx: Math.cos(theta), ny: Math.sin(theta) };
}

/* ---------------- STEP 2: per-node attachment ordering (live) ---------------- */
// For an edge touching `atNodeId`, the far node's position nudged
// perpendicular to the pair's canonical A->B direction by this edge's FIXED
// lane. Using the same shift regardless of which end is being computed is
// what keeps a bundle's lanes parallel: two edges sharing a destination get
// distinctly different (but consistently, permanently offset) aim points,
// so they naturally sort into adjacent — not swapped — attachment order at
// BOTH ends.
function edgeVirtualAim(e, atNodeId) {
  const sortedPair = [e.source, e.target].slice().sort();
  const nodeA = nodeById(sortedPair[0]), nodeB = nodeById(sortedPair[1]);
  const theta = Math.atan2(nodeB.y - nodeA.y, nodeB.x - nodeA.x);
  const perpX = -Math.sin(theta), perpY = Math.cos(theta);
  const shift = e._lane * LANE_UNIT;
  const farId = atNodeId === e.source ? e.target : e.source;
  const far = nodeById(farId);
  return { x: far.x + perpX * shift, y: far.y + perpY * shift };
}

// Pure function of CURRENT node positions: recomputes every edge touching
// `nodeId`'s attachment point at THIS node only. Call once per node at
// load, or for just the dragged node during a drag (Step 7).
function resolveNodeAttachments(nodeId) {
  const node = nodeById(nodeId);
  const touching = ALL_EDGES.filter(e => e.source === nodeId || e.target === nodeId);
  if (touching.length === 0) return;

  const entries = touching.map(e => {
    const isSource = e.source === nodeId;
    const aim = edgeVirtualAim(e, nodeId);
    const theta = Math.atan2(aim.y - node.y, aim.x - node.x);
    return { edge: e, isSource, naturalPos: angleToPerimeterPos(node, theta), halfWidth: STROKE_WIDTH[e.weight] / 2 };
  });

  const P = perimeterLength(node);
  let ordered, resolvedPositions;

  if (entries.length === 1) {
    ordered = entries;
    resolvedPositions = [((entries[0].naturalPos % P) + P) % P];
  } else {
    entries.forEach(en => { en.pos = ((en.naturalPos % P) + P) % P; });
    entries.sort((a, b) => a.pos - b.pos);
    const n = entries.length;
    // cut the loop at its largest existing gap, then enforce spacing
    // linearly from there — lets an overcrowded side spill onto a
    // neighboring one instead of clamping back onto itself
    let maxGap = -1, cutIndex = 0;
    for (let i = 0; i < n; i++) {
      const cur = entries[i].pos;
      const next = i === n - 1 ? entries[0].pos + P : entries[i + 1].pos;
      const gap = next - cur;
      if (gap > maxGap) { maxGap = gap; cutIndex = (i + 1) % n; }
    }
    ordered = entries.slice(cutIndex).concat(entries.slice(0, cutIndex));
    const unrolled = [ordered[0].pos];
    for (let i = 1; i < ordered.length; i++) {
      let p = ordered[i].pos;
      while (p < unrolled[i - 1]) p += P;
      unrolled.push(p);
    }
    for (let i = 1; i < unrolled.length; i++) {
      // minimum gap scales with BOTH edges' own thickness
      const minGap = ordered[i - 1].halfWidth + ordered[i].halfWidth + GUTTER;
      if (unrolled[i] - unrolled[i - 1] < minGap) unrolled[i] = unrolled[i - 1] + minGap;
    }
    // GUARD: never let the enforced spacing overflow one full lap — an
    // overflowing span wraps past P and lands OUT OF ORDER relative to
    // earlier entries, which reads as edges crossing near the node despite
    // no two attachment points literally overlapping. Compress
    // proportionally instead; a uniform scale of a monotonic sequence
    // stays monotonic, so the angular order survives.
    const span = unrolled[unrolled.length - 1] - unrolled[0];
    const maxSpan = P * 0.96;
    if (span > maxSpan) {
      const shrink = maxSpan / span;
      const base = unrolled[0];
      for (let i = 0; i < unrolled.length; i++) unrolled[i] = base + (unrolled[i] - base) * shrink;
    }
    resolvedPositions = unrolled.map(p => ((p % P) + P) % P);
  }

  ordered.forEach((en, i) => {
    const p = perimeterPosToPoint(node, resolvedPositions[i]);
    const gap = en.isSource ? START_GAP : ARROW_LANDING_GAP;
    const point = { x: p.x + p.nx * gap, y: p.y + p.ny * gap };
    if (en.isSource) en.edge._attachAtSource = point;
    else en.edge._attachAtTarget = point;
  });
}

/* ---------------- STEP 3: path construction (live) ---------------- */
function computeGeometry(e) {
  const start = e._attachAtSource, end = e._attachAtTarget;

  // bow direction is the PAIR's canonical perpendicular (not each edge's
  // own chord normal), so every lane in a bundle bows the same way by the
  // same amount — a uniform shift of already-parallel lanes stays parallel
  const sortedPair = [e.source, e.target].slice().sort();
  const nodeA = nodeById(sortedPair[0]), nodeB = nodeById(sortedPair[1]);
  const pairTheta = Math.atan2(nodeB.y - nodeA.y, nodeB.x - nodeA.x);
  const perpX = -Math.sin(pairTheta), perpY = Math.cos(pairTheta);

  const cdx = end.x - start.x, cdy = end.y - start.y;
  const cdist = Math.hypot(cdx, cdy) || 1;
  const bow = Math.min(BOW, cdist * 0.25);
  const mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
  const cp = { x: mx + perpX * bow, y: my + perpY * bow };

  e._geo = { start, cp, end };
  return e._geo;
}

function pathD(geo) {
  return `M${geo.start.x},${geo.start.y} Q${geo.cp.x},${geo.cp.y} ${geo.end.x},${geo.end.y}`;
}

function edgeMidpoint(e) {
  const g = e._geo || computeGeometry(e);
  const t = 0.5;
  const x = (1 - t) * (1 - t) * g.start.x + 2 * (1 - t) * t * g.cp.x + t * t * g.end.x;
  const y = (1 - t) * (1 - t) * g.start.y + 2 * (1 - t) * t * g.cp.y + t * t * g.end.y;
  return { x, y };
}

// tapered ribbon: a single filled shape, full weight-based width near the
// source, narrowing to a small non-zero floor near the target — the marker
// (Step 4) supplies the visible point, so the ribbon never needs to reach
// true zero itself
function bezierPoint(g, t) {
  const mt = 1 - t;
  return {
    x: mt * mt * g.start.x + 2 * mt * t * g.cp.x + t * t * g.end.x,
    y: mt * mt * g.start.y + 2 * mt * t * g.cp.y + t * t * g.end.y,
  };
}
function bezierNormal(g, t) {
  const mt = 1 - t;
  const dx = 2 * mt * (g.cp.x - g.start.x) + 2 * t * (g.end.x - g.cp.x);
  const dy = 2 * mt * (g.cp.y - g.start.y) + 2 * t * (g.end.y - g.cp.y);
  const len = Math.hypot(dx, dy) || 1;
  return { x: -dy / len, y: dx / len };
}
function widthAt(t, maxWidth) {
  const taperStart = 1 - TAPER_FRACTION;
  if (t <= taperStart) return maxWidth;
  const u = (t - taperStart) / TAPER_FRACTION;
  return Math.max(TAPER_MIN_WIDTH, maxWidth - (maxWidth - TAPER_MIN_WIDTH) * u);
}
function ribbonSegment(g, t0, t1, maxWidth, n, roundCaps) {
  const left = [], right = [];
  for (let i = 0; i <= n; i++) {
    const t = t0 + (t1 - t0) * (i / n);
    const p = bezierPoint(g, t);
    const nrm = bezierNormal(g, t);
    const hw = widthAt(t, maxWidth) / 2;
    left.push([p.x + nrm.x * hw, p.y + nrm.y * hw]);
    right.push([p.x - nrm.x * hw, p.y - nrm.y * hw]);
  }
  if (!roundCaps) {
    let d = `M${left[0][0]},${left[0][1]} `;
    for (let i = 1; i < left.length; i++) d += `L${left[i][0]},${left[i][1]} `;
    for (let i = right.length - 1; i >= 0; i--) d += `L${right[i][0]},${right[i][1]} `;
    return d + 'Z ';
  }
  // rounded caps: swap the flat start/end edges for semicircular arcs sized
  // to the local half-width, so each dash/dot reads as a rounded mark
  // instead of a squared-off tick
  const hw0 = widthAt(t0, maxWidth) / 2;
  const hw1 = widthAt(t1, maxWidth) / 2;
  const last = left.length - 1;
  let d = `M${right[0][0]},${right[0][1]} `;
  d += `A${hw0},${hw0} 0 0 0 ${left[0][0]},${left[0][1]} `;
  for (let i = 1; i <= last; i++) d += `L${left[i][0]},${left[i][1]} `;
  d += `A${hw1},${hw1} 0 0 0 ${right[last][0]},${right[last][1]} `;
  for (let i = last - 1; i >= 0; i--) d += `L${right[i][0]},${right[i][1]} `;
  return d + 'Z ';
}
function taperedPath(e) {
  const g = e._geo;
  const maxWidth = STROKE_WIDTH[e.weight];
  if (e.status !== 'hypothesis') return ribbonSegment(g, 0, 1, maxWidth, RIBBON_SEGMENTS);
  // dotted: dash length = 0.25x the LOCAL stroke width at each point
  // (equivalent to stroke-dasharray: calc(w*0.25) calc(w*0.75)), recomputed
  // every step from widthAt() so dot size shrinks through the taper along
  // with the ribbon itself. The gap is authored as the same 0.75x, then
  // inflated by +1x width: each dot's round cap bulges outward by ~half
  // its own width at both ends (true for real stroke-linecap:round too),
  // which eats straight into the raw gap — left uncompensated, 0.75x isn't
  // enough clearance and adjacent dots visually merge into a solid line.
  // Adding back the ~1x width the caps consume keeps the VISIBLE gap at
  // the intended 0.75x proportion instead of the pre-cap one.
  const chord = Math.hypot(g.end.x - g.start.x, g.end.y - g.start.y) || 1;
  let d = '', t = 0;
  while (t < 1) {
    const localWidth = widthAt(t, maxWidth);
    const dashOn = (localWidth * 0.25) / chord;
    const dashGap = (localWidth * 1.75) / chord;
    const t1 = Math.min(1, t + dashOn);
    d += ribbonSegment(g, t, t1, maxWidth, DASH_SEGMENTS, true);
    t = t1 + dashGap;
  }
  return d;
}

/* ---------------- STEP 4: arrowheads — native SVG <marker> ---------------- */
// orient="auto-start-reverse" reads the carrier path's own tangent at its
// final vertex, so orientation always matches the curve's actual approach
// direction with no hand-computed angle math. markerUnits="strokeWidth"
// scales the whole marker (geometry AND its internal stroke-width) by the
// carrier's stroke-width, so a weight-1 edge gets a small, thin chevron and
// a weight-3 edge gets a proportionally larger — but still delicate — one.
const markerDefs = svg.append('defs');
VALUE_TYPES.map(v => v.id).concat(['opportunity', 'data']).forEach(type => {
  const colorVar = type === 'opportunity' ? 'lime' : type;
  markerDefs.append('marker')
    .attr('id', 'arrow-' + type)
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 9)
    .attr('refY', 5)
    .attr('markerWidth', 4)
    .attr('markerHeight', 4)
    .attr('markerUnits', 'strokeWidth')
    .attr('orient', 'auto-start-reverse')
    .append('path')
    .attr('d', 'M 1.5 1.5 L 8 5 L 1.5 8.5')
    .attr('fill', 'none')
    .attr('stroke', `var(--${colorVar})`)
    .attr('stroke-width', 1.2)
    .attr('stroke-linecap', 'round')
    .attr('stroke-linejoin', 'round');
});

/* ---------------- STEP 5: particles ---------------- */
// Position travels via CSS offset-path/offset-distance. Radius is driven by
// a single rAF loop so each particle stays sized to the LOCAL taper width
// under it (~1.3x), recomputed every frame.
// Data-layer particles render as a small diamond <path> instead of a
// <circle> — the "data glyph" that keeps the overlay legible as a distinct
// system even where an edge is solid (finding-status) rather than dotted.
// A path centered on its own (0,0) sits correctly on the offset-path with
// no anchor math, the same way the plain circle (cx/cy default 0,0) already
// does — only the shape differs.
const activeParticles = [];
function spawnParticles(parent, e) {
  const n = e.weight;
  const dur = PARTICLE_DURATION[e.weight];
  const maxWidth = STROKE_WIDTH[e.weight];
  const color = e.isOpportunity ? 'var(--lime)' : `var(--${e.type})`;
  const isData = e.type === 'data';
  for (let i = 0; i < n; i++) {
    const el = parent.append(isData ? 'path' : 'circle')
      .attr('class', 'particle')
      .style('fill', color)
      .style('offset-path', `path('${pathD(e._geo)}')`)
      .style('animation-duration', dur + 's')
      .style('animation-delay', (-(i / n) * dur) + 's')
      .node();
    activeParticles.push({ el, maxWidth, duration: dur, phase: i / n, isOpportunity: !!e.isOpportunity, isData });
  }
}
function tickParticles(ts) {
  const seconds = ts / 1000;
  activeParticles.forEach(p => {
    const t = (((seconds / p.duration) + p.phase) % 1 + 1) % 1;
    const w = widthAt(t, p.maxWidth);
    if (p.isData) {
      const h = Math.max(0.5, (w * 1.3) / 2);
      p.el.setAttribute('d', `M0,${-h} L${h},0 L0,${h} L${-h},0 Z`);
    } else {
      p.el.setAttribute('r', Math.max(0.5, (w * 1.3) / 2));
    }
  });
  requestAnimationFrame(tickParticles);
}
requestAnimationFrame(tickParticles);

// layers, created up front so z-order is fixed regardless of when we later
// populate each with children: value edges at the bottom, then the data
// overlay, then opportunity edges, nodes on top
const edgeLayer = svg.append('g').attr('id', 'edge-layer');
const dataEdgeLayer = svg.append('g').attr('id', 'data-edge-layer');
const oppEdgeLayer = svg.append('g').attr('id', 'opp-edge-layer');
const nodeLayer = svg.append('g').attr('id', 'node-layer');

// --- node cards ------------------------------------------------------------
// UNCHANGED: built and measured first (before edge geometry) because
// attachment resolution needs each card's real width/height.
const nodeGroups = nodeLayer.selectAll('g.node-group')
  .data(NODES)
  .join('g')
  .attr('class', 'node-group')
  .attr('id', d => 'node-' + d.id)
  .attr('transform', d => `translate(${d.x},${d.y})`)
  .call(d3.drag().on('drag', dragged));

const CARD_PAD_X = 23, CARD_PAD_Y = 17, CARD_MIN_W = 102, CARD_MIN_H = 59;

nodeGroups.each(function (d) {
  const g = d3.select(this);

  const titleText = g.append('text')
    .attr('class', 'node-title' + (d.group === 'core' ? ' core' : ''))
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'hanging');

  const words = d.label.split(' ');
  const lines = [];
  let line = '';
  words.forEach(w => {
    const test = (line ? line + ' ' : '') + w;
    if (test.length > 20 && line) { lines.push(line); line = w; }
    else line = test;
  });
  if (line) lines.push(line);
  lines.forEach((l, i) => {
    titleText.append('tspan').attr('x', 0).attr('dy', i === 0 ? 0 : '1.25em').text(l);
  });

  const titleBBox = titleText.node().getBBox();
  const contentWidth = titleBBox.width;
  const contentHeight = titleBBox.height;

  const cardW = Math.max(CARD_MIN_W, contentWidth + CARD_PAD_X * 2);
  const cardH = Math.max(CARD_MIN_H, contentHeight + CARD_PAD_Y * 2);
  d._cardW = cardW;
  d._cardH = cardH;

  // foreignObject, not <rect>: box-shadow doesn't paint on SVG shape
  // geometry, so the card needs a real HTML box. The foreignObject's
  // x/y/width/height match exactly what the rect used to occupy — the
  // footprint attachment math depends on is unchanged.
  g.insert('foreignObject', ':first-child')
    .attr('x', -cardW / 2)
    .attr('y', -cardH / 2)
    .attr('width', cardW)
    .attr('height', cardH)
    .append('xhtml:div')
    .attr('class', 'node-card');

  // dominant-baseline: hanging' nominal top doesn't exactly match the
  // font's true ink top (font-metric dependent, a few px off), so derive
  // the y-shift from the MEASURED bbox rather than assuming contentHeight
  // alone centers it — this lands the ink's actual vertical midpoint, not
  // just its nominal em-box midpoint, on the card's true center (y=0)
  titleText.attr('y', -(titleBBox.y + contentHeight / 2));
});

// resolve Step 2 for every node once, at load, using the fixed default layout
NODES.forEach(n => resolveNodeAttachments(n.id));

// shared builder for value edges, opportunity edges, and data edges alike —
// generic over `d.type` (including the 'data' type) and `d.isOpportunity`
function buildEdgeVisuals(sel) {
  sel.each(function (d) {
    computeGeometry(d);
    const g = d3.select(this);
    const color = d.isOpportunity ? 'var(--lime)' : `var(--${d.type})`;

    g.append('path')
      .attr('class', 'edge-hit')
      .attr('stroke-width', STROKE_WIDTH[d.weight] + 20)
      .attr('d', pathD(d._geo));

    g.append('path')
      .attr('class', 'edge-line')
      .attr('d', taperedPath(d))
      .attr('fill', color);

    // invisible carrier for the SVG <marker> arrowhead — the marker
    // attaches to this path's final vertex and is oriented/scaled
    // automatically by the browser
    g.append('path')
      .attr('class', 'edge-marker')
      .attr('d', pathD(d._geo))
      .attr('stroke-width', STROKE_WIDTH[d.weight])
      .attr('marker-end', `url(#arrow-${d.isOpportunity ? 'opportunity' : d.type})`);

    spawnParticles(g.append('g').attr('class', 'particle-layer'), d);
  });

  sel
    .on('mouseenter', function (event, d) {
      setEdgeHighlight(d._id);
      showTooltip(event, edgeTooltipHtml(d));
    })
    .on('mousemove', moveTooltip)
    .on('mouseleave', function () {
      setEdgeHighlight(null);
      hideTooltip();
    });
}

function refreshEdgeGeometry(e) {
  computeGeometry(e);
  const g = d3.select('#' + e._id);
  if (g.empty()) return; // opportunity edge currently unmounted
  const d = pathD(e._geo);
  g.select('.edge-hit').attr('d', d);
  g.select('.edge-line').attr('d', taperedPath(e));
  g.select('.edge-marker').attr('d', d);
  g.selectAll('.particle').style('offset-path', `path('${d}')`);
}

function setEdgeHighlight(activeId) {
  edgeGroups.classed('dim', e => activeId !== null && e._id !== activeId);
  edgeGroups.classed('highlight', e => e._id === activeId);
  oppEdgeLayer.selectAll('.edge-group').classed('dim', e => activeId !== null && e._id !== activeId);
  oppEdgeLayer.selectAll('.edge-group').classed('highlight', e => e._id === activeId);
  dataEdgeLayer.selectAll('.edge-group').classed('dim', e => activeId !== null && e._id !== activeId);
  dataEdgeLayer.selectAll('.edge-group').classed('highlight', e => e._id === activeId);
}

// --- value edges ---
const edgeGroups = edgeLayer.selectAll('g.edge-group')
  .data(EDGES)
  .join('g')
  .attr('class', d => `edge-group type-${d.type}` + (d.fragileTrust ? ' fragile-trust' : ''))
  .attr('id', d => d._id);

buildEdgeVisuals(edgeGroups);

function setNodeHighlight(nodeId) {
  if (nodeId === null) { setEdgeHighlight(null); return; }
  const connected = new Set(
    ALL_EDGES.filter(e => e.source === nodeId || e.target === nodeId).map(e => e._id)
  );
  edgeGroups.classed('dim', e => !connected.has(e._id));
  edgeGroups.classed('highlight', e => connected.has(e._id));
  oppEdgeLayer.selectAll('.edge-group').classed('dim', e => !connected.has(e._id));
  oppEdgeLayer.selectAll('.edge-group').classed('highlight', e => connected.has(e._id));
  dataEdgeLayer.selectAll('.edge-group').classed('dim', e => !connected.has(e._id));
  dataEdgeLayer.selectAll('.edge-group').classed('highlight', e => connected.has(e._id));
}

nodeGroups
  .on('mouseenter', function (event, d) {
    setNodeHighlight(d.id);
    d3.select(this).select('.node-card').classed('highlight', true);
    showTooltip(event, nodeTooltipHtml(d));
  })
  .on('mousemove', moveTooltip)
  .on('mouseleave', function () {
    setNodeHighlight(null);
    d3.select(this).select('.node-card').classed('highlight', false);
    hideTooltip();
  });

/* ---------------- STEP 7: live recomputation on drag ---------------- */
// Scoped to the dragged node only: re-run Step 2 for just this node (its
// touching edges' attachment points AT this node), then rebuild geometry
// for those same edges. The far end of each touching edge keeps whatever
// attachment point it already had — its own node didn't move, and re-
// resolving it too isn't needed for correctness, only for an already-solved
// ordering that hasn't changed, so skipping it keeps drag responsive even
// on a fully-connected graph.
function dragged(event, d) {
  d.x = event.x;
  d.y = event.y;
  d3.select(this).attr('transform', `translate(${d.x},${d.y})`);
  resolveNodeAttachments(d.id);
  ALL_EDGES.forEach(e => {
    if (e.source === d.id || e.target === d.id) refreshEdgeGeometry(e);
  });
}

/* ================================================================
   OPPORTUNITY OVERLAY — proposed-flow arrows + one text callout
   ================================================================ */
function renderOpportunityEdges() {
  const active = document.getElementById('opp-toggle').classList.contains('on');

  for (let i = activeParticles.length - 1; i >= 0; i--) {
    if (activeParticles[i].isOpportunity) activeParticles.splice(i, 1);
  }

  const sel = oppEdgeLayer.selectAll('g.edge-group').data(active ? OPPORTUNITY_EDGES : [], d => d._id);
  sel.exit().remove();
  const enter = sel.enter().append('g')
    .attr('class', d => `edge-group opp-edge type-${d.type}`)
    .attr('id', d => d._id);
  buildEdgeVisuals(enter);
  applyIsolation();
}

/* ================================================================
   DATA OVERLAY — data-movement edges, toggled independently of both
   the Opportunities overlay and the value-layer isolate pills (see
   applyIsolation — it deliberately never touches dataEdgeLayer, since
   type: 'data' is never a member of activeTypes and this layer is meant
   to read as a separate system, not a sixth value type).
   ================================================================ */
function renderDataEdges() {
  const active = document.getElementById('data-toggle').classList.contains('on');

  for (let i = activeParticles.length - 1; i >= 0; i--) {
    if (activeParticles[i].isData) activeParticles.splice(i, 1);
  }

  const sel = dataEdgeLayer.selectAll('g.edge-group').data(active ? DATA_EDGES : [], d => d._id);
  sel.exit().remove();
  const enter = sel.enter().append('g')
    .attr('class', d => `edge-group data-edge type-${d.type}`)
    .attr('id', d => d._id);
  buildEdgeVisuals(enter);
}

// ON: filled with the pill's own color, contrast text, no border.
// OFF: transparent fill (background.jpg shows through), border always in
// the pill's own color (still identifies the layer). Text is normally the
// pill's own color too, EXCEPT for the pale/mid colors below (Emotional,
// Identity, Opportunities/lime, Data/gray) where that color is too washed
// out as text against the background — those always use dark text in OFF
// state, border unchanged.
const OFF_TEXT_DARK = new Set(['emotional', 'identity', 'lime', 'data']);
function paintPill(btn, colorVar, onTextColor, isOn) {
  if (isOn) {
    btn.style.background = `var(--${colorVar})`;
    btn.style.color = onTextColor;
    btn.style.borderColor = 'transparent';
  } else {
    btn.style.background = 'transparent';
    btn.style.color = OFF_TEXT_DARK.has(colorVar) ? '#1E1E1E' : `var(--${colorVar})`;
    btn.style.borderColor = `var(--${colorVar})`;
  }
}

paintPill(document.getElementById('opp-toggle'), 'lime', 'var(--text)', false);

document.getElementById('opp-toggle').addEventListener('click', function () {
  const isOn = this.classList.toggle('on');
  paintPill(this, 'lime', 'var(--text)', isOn);
  renderOpportunityEdges();
});

paintPill(document.getElementById('data-toggle'), 'data', 'var(--bg)', false);

document.getElementById('data-toggle').addEventListener('click', function () {
  const isOn = this.classList.toggle('on');
  paintPill(this, 'data', 'var(--bg)', isOn);
  renderDataEdges();
});

/* ================================================================
   VALUE-TYPE TOGGLES (isolate, not filter) — filled pills
   ================================================================ */
const activeTypes = new Set(VALUE_TYPES.map(v => v.id));
const toggleWrap = document.getElementById('value-toggles');

VALUE_TYPES.forEach(vt => {
  const btn = document.createElement('button');
  btn.className = 'pill';
  btn.dataset.type = vt.id;
  btn.textContent = vt.label;
  paintPill(btn, vt.id, PILL_ON_TEXT[vt.id], true);
  btn.addEventListener('click', () => {
    let isOn;
    if (activeTypes.has(vt.id)) { activeTypes.delete(vt.id); isOn = false; }
    else { activeTypes.add(vt.id); isOn = true; }
    paintPill(btn, vt.id, PILL_ON_TEXT[vt.id], isOn);
    applyIsolation();
  });
  toggleWrap.appendChild(btn);
});

function applyIsolation() {
  edgeGroups.classed('ghost', d => !activeTypes.has(d.type));
  oppEdgeLayer.selectAll('.edge-group').classed('ghost', d => !activeTypes.has(d.type));
}

/* ================================================================
   TOOLTIP
   ================================================================ */
const tooltip = document.getElementById('tooltip');

function showTooltip(event, html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(event);
}
function moveTooltip(event) {
  tooltip.style.left = event.clientX + 'px';
  tooltip.style.top = event.clientY + 'px';
}
function hideTooltip() {
  tooltip.classList.remove('visible');
}

function edgeTooltipHtml(d) {
  const srcLabel = nodeById(d.source).label;
  const tgtLabel = nodeById(d.target).label;
  const swatchColor = d.isOpportunity ? 'var(--lime)' : `var(--${d.type})`;
  let html = `<div class="t-route">${srcLabel} → ${tgtLabel}</div>`;
  html += `<div class="t-verb">${d.verb}</div>`;
  html += `<div class="t-type"><span class="t-swatch" style="background:${swatchColor}"></span>${d.type[0].toUpperCase() + d.type.slice(1)}</div>`;
  if (d.note) html += `<div class="t-note">${d.note}</div>`;
  if (d.isOpportunity) {
    html += `<div class="t-basis">Opportunity — proposed, not evidenced</div>`;
  } else if (d.basis === 'interview') {
    const names = d.names && d.names.length ? d.names.join(', ') : '';
    html += `<div class="t-basis">From interviews${names ? ': ' + names : ''}</div>`;
  } else if (d.basis === 'context') {
    html += `<div class="t-basis">Contextual inference — not named by participants</div>`;
  } else if (d.basis === 'market') {
    html += `<div class="t-basis">Market-structural — not from this research</div>`;
  }
  if (d.trustNote) html += `<div class="t-trust">Trust: ${d.trustNote}</div>`;
  return html;
}

function nodeTooltipHtml(d) {
  let html = `<div class="t-node-title">${d.label}</div>`;
  html += `<div class="t-node-sentence">${d.sentence}</div>`;
  if (d.bullets && d.bullets.length) {
    html += '<ul class="t-node-bullets">' + d.bullets.map(b => `<li>• ${b}</li>`).join('') + '</ul>';
  }
  return html;
}

/* ================================================================
   INIT
   ================================================================ */
applyIsolation();
renderOpportunityEdges();
renderDataEdges();
</script>
</body>
</html>
